model = "gpt-5.3-codex"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
web_search = "live"

[sandbox_workspace_write]
network_access = true

developer_instructions = """
Own the evidence-gathering phase.
Use live web search and prefer official OpenAI sources first, then high-signal primary sources when needed.
Normalize every included item to an exact publish or update date and exclude anything outside the trailing 7-day window.
Deduplicate aggressively and flag low-signal, rumor-like, or unverifiable items instead of guessing.
Write only the research outputs under data/ unless the parent agent explicitly expands your scope.
Return concise structured findings, not polished memo copy.
"""
